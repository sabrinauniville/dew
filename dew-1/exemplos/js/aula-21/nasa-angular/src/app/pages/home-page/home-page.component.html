<section class="home-page">
  <header class="hero">
    <h2>Astronomy Picture of the Day</h2>
    <p>Este exemplo mostra como buscar dados de uma API com HttpClient e exibi-los de forma organizada.</p>
  </header>

  <div *ngIf="isLoading" class="status">Carregando imagem...</div>
  <div *ngIf="hasError" class="status error">Não foi possível carregar a imagem no momento.</div>

  <article *ngIf="photoOfTheDay as photo" class="content-card">
    <div class="text-block">
      <h3>{{ photo.title }}</h3>
      <p class="date">{{ photo.date }}</p>
      <p>{{ photo.explanation }}</p>
    </div>

    <img [src]="photo.url" [alt]="photo.title" />
  </article>
</section>
